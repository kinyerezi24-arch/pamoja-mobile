name: pamoja_mobile
description: |
  PAMOJA Mobile - A modular Business Operating System built for African businesses.
  Mobile-first platform for daily business operations.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # UI & Design
  google_fonts: ^6.1.0

  # Localization
  intl: ^0.19.0

  # HTTP & Networking
  dio: ^5.3.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.4.1
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  # Localization assets
  generate: true
